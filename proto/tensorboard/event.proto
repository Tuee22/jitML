syntax = "proto3";

package jitml.tensorboard;

message Event {
  double wall_time = 1;
  int64 step = 2;
  oneof what {
    string file_version = 3;
    Summary summary = 5;
  }
}

message Summary {
  repeated Value value = 1;

  message Value {
    string tag = 1;
    float simple_value = 2;
  }
}
