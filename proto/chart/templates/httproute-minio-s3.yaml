apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-s3
  namespace: platform
  labels:
    app.kubernetes.io/part-of: jitml
spec:
  parentRefs:
    - name: jitml-edge
      namespace: platform
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /minio/s3
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: minio
          port: 9000
