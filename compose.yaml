x-jitml-service: &jitml-service
  image: jitml:local
  build:
    context: .
    dockerfile: docker/Dockerfile
  network_mode: host
  working_dir: ${PWD}
  volumes:
    - .:${PWD}
    - /var/run/docker.sock:/var/run/docker.sock

services:
  jitml:
    <<: *jitml-service

  jitml-cuda:
    <<: *jitml-service
    # Expose every NVIDIA GPU on the host through the NVIDIA Container
    # Runtime so live CUDA validation can launch real kernels (`jitml service`,
    # `cabal test jitml-backends`'s CUDA cases). Use the default `jitml`
    # service for headless code-quality and non-GPU command runs.
    gpus: all
