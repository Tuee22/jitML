kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: jitml-linux-cpu
nodes:
  - role: control-plane
    image: kindest/node:v1.34.0
    extraPortMappings:
      - containerPort: 30090
        hostPort: 9091
        listenAddress: 127.0.0.1
        protocol: TCP
    extraMounts:
      - hostPath: ./.build
        containerPath: /jitml/.build
        readOnly: false
      - hostPath: ./.data
        containerPath: /jitml/.data
        readOnly: false
