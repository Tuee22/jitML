kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: jitml-apple-silicon
nodes:
  - role: control-plane
    image: kindest/node:v1.32.2
    extraPortMappings:
      - containerPort: 30090
        hostPort: 9090
        listenAddress: 127.0.0.1
        protocol: TCP
  - role: worker
    image: kindest/node:v1.32.2
    extraMounts:
      - hostPath: ./.build
        containerPath: /jitml/.build
        readOnly: false
