substrate: apple-silicon
edgePort: 9090

jitml:
  image:
    repository: jitml
    tag: local
  demoImage:
    repository: jitml-demo
    tag: local
  storageClass: jitml-manual

harbor:
  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: http://127.0.0.1:9090
  database:
    type: external
    external:
      host: harbor-pg-pgbouncer.platform.svc
      port: "5432"
      username: harbor
      coreDatabase: harbor
      existingSecret: harbor-pg-secrets
      sslmode: require
  persistence:
    imageChartStorage:
      type: s3
      disableredirect: true
      s3:
        region: us-east-1
        bucket: harbor-registry
        accesskey: minio
        secretkey: minioadmin
        regionendpoint: http://minio.platform.svc.cluster.local:9000
        secure: false
        v4auth: true
        chunksize: "134217728"
    persistentVolumeClaim:
      registry:
        storageClass: jitml-manual

minio:
  mode: distributed
  replicas: 4
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
    tag: 2024.11.7-debian-12-r0
  clientImage:
    registry: docker.io
    repository: bitnamilegacy/minio-client
    tag: 2024.10.29-debian-12-r1
  persistence:
    storageClass: jitml-manual
  provisioning:
    enabled: true
    buckets:
      - name: harbor-registry
      - name: jitml-checkpoints
      - name: jitml-datasets
      - name: jitml-transcripts
      - name: jitml-trials
      - name: jitml-tensorboard
      - name: jitml-artifacts

pulsar:
  zookeeper:
    replicaCount: 3
  bookkeeper:
    replicaCount: 3
  broker:
    replicaCount: 3
    configData:
      webSocketServiceEnabled: "true"
  proxy:
    replicaCount: 3
    service:
      type: ClusterIP

kube-prometheus-stack:
  grafana:
    enabled: true
