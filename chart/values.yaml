substrate: apple-silicon
edgePort: 9090

jitml:
  image:
    repository: jitml
    tag: local
  demoImage:
    repository: jitml-demo
    tag: local
  storageClass: jitml-manual

harbor:
  expose:
    type: clusterIP
  persistence:
    persistentVolumeClaim:
      registry:
        storageClass: jitml-manual

minio:
  mode: distributed
  replicas: 4
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
    tag: 2024.11.7-debian-12-r0
  clientImage:
    registry: docker.io
    repository: bitnamilegacy/minio-client
    tag: 2024.10.29-debian-12-r1
  persistence:
    storageClass: jitml-manual
  provisioning:
    enabled: true
    buckets:
      - name: harbor-registry
      - name: jitml-checkpoints
      - name: jitml-datasets
      - name: jitml-transcripts
      - name: jitml-trials
      - name: jitml-tensorboard
      - name: jitml-artifacts

pulsar:
  zookeeper:
    replicaCount: 3
  bookkeeper:
    replicaCount: 3
  broker:
    replicaCount: 3
  proxy:
    replicaCount: 3

kube-prometheus-stack:
  grafana:
    enabled: true
