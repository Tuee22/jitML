image:
  registry: docker.io
  repository: bitnamilegacy/minio
  tag: 2024.11.7-debian-12-r0

clientImage:
  registry: docker.io
  repository: bitnamilegacy/minio-client
  tag: 2024.10.29-debian-12-r1

mode: standalone

# Sprint 4.8 — pod resource budget from dhall/cluster/resources.dhall (`minio`).
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

auth:
  rootUser: minio
  rootPassword: minioadmin

defaultBuckets: harbor-registry,jitml-checkpoints,jitml-datasets,jitml-transcripts,jitml-trials,jitml-tensorboard,jitml-artifacts
