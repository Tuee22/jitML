image:
  registry: docker.io
  repository: bitnamilegacy/minio
  tag: 2024.11.7-debian-12-r0

clientImage:
  registry: docker.io
  repository: bitnamilegacy/minio-client
  tag: 2024.10.29-debian-12-r1

mode: distributed
replicas: 4

# Sprint 4.10 — HA pod resource budget from dhall/cluster/resources.dhall (`minio`).
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

auth:
  rootUser: minio
  rootPassword: minioadmin

provisioning:
  enabled: true
  buckets:
    - name: harbor-registry
      versioning: Unchanged
    - name: jitml-checkpoints
      versioning: Unchanged
    - name: jitml-datasets
      versioning: Unchanged
    - name: jitml-transcripts
      versioning: Unchanged
    - name: jitml-trials
      versioning: Unchanged
    - name: jitml-tensorboard
      versioning: Unchanged
    - name: jitml-artifacts
      versioning: Unchanged

persistence:
  enabled: true
  storageClass: jitml-manual
  size: 20Gi

volumes:
  persistence: true

podAntiAffinityPreset: soft
