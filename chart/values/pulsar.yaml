initialize: true
persistence: true

volumes:
  persistence: true

affinity:
  anti_affinity: true

kube-prometheus-stack:
  enabled: false

# Sprint 4.10 — HA pod resource budgets from dhall/cluster/resources.dhall
# (`pulsar`; applied uniformly across zk/bookkeeper/broker/proxy).
zookeeper:
  replicaCount: 3
  podMonitor:
    enabled: false
  affinity:
    anti_affinity: true
  volumes:
    persistence: true
    data:
      size: 10Gi
      storageClassName: jitml-manual
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

bookkeeper:
  replicaCount: 3
  podMonitor:
    enabled: false
  affinity:
    anti_affinity: true
  volumes:
    persistence: true
    journal:
      size: 10Gi
      storageClassName: jitml-manual
    ledgers:
      size: 20Gi
      storageClassName: jitml-manual
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

broker:
  replicaCount: 3
  configData:
    webSocketServiceEnabled: "true"
  podMonitor:
    enabled: false
  affinity:
    anti_affinity: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

proxy:
  replicaCount: 3
  service:
    type: ClusterIP
  podMonitor:
    enabled: false
  affinity:
    anti_affinity: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

autorecovery:
  podMonitor:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
