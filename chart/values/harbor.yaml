expose:
  type: clusterIP
  tls:
    enabled: false

externalURL: http://127.0.0.1:9090

database:
  type: external
  external:
    host: harbor-pg-pgbouncer.platform.svc
    port: "5432"
    username: harbor
    coreDatabase: harbor
    existingSecret: harbor-pg-secrets
    sslmode: require

persistence:
  imageChartStorage:
    type: s3
    disableredirect: true
    s3:
      region: us-east-1
      bucket: harbor-registry
      accesskey: minio
      secretkey: minioadmin
      regionendpoint: http://minio.platform.svc.cluster.local:9000
      secure: false
      v4auth: true
      chunksize: "134217728"
  persistentVolumeClaim:
    registry:
      storageClass: jitml-manual

# Sprint 4.8 — pod resource budgets from dhall/cluster/resources.dhall
# (`harbor`; applied uniformly across core/portal/registry/jobservice/trivy on
# the single-node local stack).
core:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
portal:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
registry:
  registry:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  controller:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
jobservice:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
trivy:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
redis:
  internal:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
