apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorboard
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tensorboard
  template:
    metadata:
      labels:
        app: tensorboard
    spec:
      containers:
        - name: tensorboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c"]
          args:
            - >-
              pip install --no-cache-dir
              setuptools=={{ .Values.tensorboard.setuptoolsVersion }}
              '{{ .Values.tensorboard.numpyConstraint }}'
              tensorboard=={{ .Values.tensorboard.version }}
              >/tmp/tensorboard-pip.log 2>&1 &&
              tensorboard --logdir /tensorboard/logs --bind_all --port 6006
          ports:
            - name: http
              containerPort: 6006
          # Sprint 4.8 — pod budget from dhall/cluster/resources.dhall (`tensorboard`).
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tensorboard-logs
              mountPath: /tensorboard/logs
        - name: minio-sync
          image: "{{ .Values.minioClient.image.repository }}:{{ .Values.minioClient.image.tag }}"
          command: ["sh", "-c"]
          args:
            - >-
              set -eu; /opt/bitnami/minio-client/bin/mc alias set jitml-minio {{ .Values.minio.endpoint }} {{ .Values.minio.accessKey }} {{ .Values.minio.secretKey }} >/dev/null; while true; do /opt/bitnami/minio-client/bin/mc mirror --overwrite jitml-minio/{{ .Values.minio.bucket }} /tensorboard/logs >/dev/null || true; sleep 5; done
          # Sprint 4.8 — small budget for the mc-mirror sidecar.
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tensorboard-logs
              mountPath: /tensorboard/logs
      volumes:
        - name: tensorboard-logs
          emptyDir: {}
