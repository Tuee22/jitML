apiVersion: v1
kind: ConfigMap
metadata:
  name: jitml-service-config
  namespace: platform
data:
  BootConfig.dhall: |
    { substrate = "{{ .Values.substrate }}"
    , residency = Cluster
    , inferenceMode = {{ if eq .Values.substrate "apple-silicon" }}ForwardToHost{{ else }}SelfInference{{ end }}
    , pulsarServiceUrl = "pulsar://pulsar-proxy.platform.svc.cluster.local:6650"
    , pulsarAdminUrl = "http://pulsar-proxy.platform.svc.cluster.local:80"
    , minioEndpoint = "http://minio.platform.svc.cluster.local:9000"
    , harborRegistry = "harbor-registry.platform.svc.cluster.local:5000/library"
    , httpListener = Some { host = "0.0.0.0", port = 8080 }
    }
  LiveConfig.dhall: |
    { logLevel = "info"
    , retry = { maxAttempts = 5, baseDelayMs = 100, maxDelayMs = 5000 }
    , tartIdleTimeoutSeconds = 900
    , inferenceBatchMax = 32
    , inferenceSloMs = 100
    , drainDeadlineSeconds = 30
    }
