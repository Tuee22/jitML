apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-service
  namespace: platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jitml-service
  template:
    metadata:
      labels:
        app: jitml-service
        jitml.substrate: {{ .Values.substrate | quote }}
    spec:
      serviceAccountName: jitml-service
      {{- if eq .Values.substrate "linux-cuda" }}
      runtimeClassName: nvidia
      {{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: jitml-service
      containers:
        - name: jitml-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["jitml"]
          args: ["service", "--config", "/etc/jitml/BootConfig.dhall"]
          {{- if eq .Values.substrate "linux-cuda" }}
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          {{- end }}
          volumeMounts:
            - name: jit-cache
              mountPath: /opt/build
            - name: service-config
              mountPath: /etc/jitml
      volumes:
        - name: jit-cache
          hostPath:
            path: /jitml/.build
        - name: service-config
          configMap:
            name: jitml-service-config
