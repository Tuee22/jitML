apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-service
  namespace: platform
spec:
  replicas: {{ if eq .Values.substrate "apple-silicon" }}{{ .Values.appleForwarderReplicas }}{{ else }}{{ .Values.engineReplicas }}{{ end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jitml-service
  template:
    metadata:
      labels:
        app: jitml-service
        jitml.substrate: {{ .Values.substrate | quote }}
        jitml.role: engine
        jitml.compute: {{ if eq .Values.substrate "apple-silicon" }}"false"{{ else }}"true"{{ end }}
    spec:
      serviceAccountName: jitml-service
      {{- if eq .Values.substrate "linux-cuda" }}
      runtimeClassName: nvidia
      {{- end }}
      {{- if ne .Values.substrate "apple-silicon" }}
      nodeSelector:
        jitml.node-role/compute: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  jitml.compute: "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              jitml.compute: "true"
      {{- end }}
      containers:
        - name: jitml-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["jitml"]
          args: ["service", "--config", "/etc/jitml/BootConfig.dhall"]
          # Sprint 4.8 — pod budget from dhall/cluster/resources.dhall (`jitmlService`).
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          {{- if eq .Values.substrate "linux-cuda" }}
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          {{- end }}
          volumeMounts:
            - name: jit-cache
              mountPath: /opt/build
            - name: service-config
              mountPath: /etc/jitml
      volumes:
        - name: jit-cache
          hostPath:
            path: /jitml/.build
        - name: service-config
          configMap:
            name: jitml-service-config
