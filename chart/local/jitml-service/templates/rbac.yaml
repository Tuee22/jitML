apiVersion: v1
kind: ServiceAccount
metadata:
  name: jitml-service
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jitml-service
  namespace: platform
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jitml-service
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: jitml-service
    namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jitml-service
