apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-demo
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitml-demo
  template:
    metadata:
      labels:
        app: jitml-demo
    spec:
      {{- if eq .Values.substrate "linux-cuda" }}
      # Sprint 15.20 — the demo serves checkpoint-backed inference in-process
      # through the cluster substrate runtime; on linux-cuda that JIT-compiles
      # and dispatches CUDA kernels, so the demo pod needs the NVIDIA runtime
      # class and an attached GPU exactly like jitml-service.
      runtimeClassName: nvidia
      {{- end }}
      containers:
        - name: jitml-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          # Sprint 11.10 — the demo is the one-binary Webapp role: `jitml service`
          # with activeRole=Webapp (typed Dhall config), folding in the retired
          # `jitml-demo` executable. It serves the bundle + /api/ws bridge and
          # publishes inference WorkCommands to the Engine; it computes nothing.
          command: ["jitml", "service", "--config", "/etc/jitml/BootConfig.dhall"]
          workingDir: /jitml
          # Sprint 4.8 — pod budget from dhall/cluster/resources.dhall (`jitmlDemo`).
          # Sprint 15.20 — linux-cuda raises the budget because the in-process
          # `nvcc` JIT compile of the inference kernel needs far more than the
          # 256Mi CPU-lane ceiling (a too-small limit OOM-kills the compile).
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              {{- if eq .Values.substrate "linux-cuda" }}
              cpu: "2"
              memory: 4Gi
              {{- else }}
              cpu: 250m
              memory: 256Mi
              {{- end }}
          {{- if eq .Values.substrate "linux-cuda" }}
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          {{- end }}
          volumeMounts:
            - name: webapp-config
              mountPath: /etc/jitml
              readOnly: true
          ports:
            - name: http
              containerPort: 80
      volumes:
        - name: webapp-config
          configMap:
            name: jitml-webapp-config
