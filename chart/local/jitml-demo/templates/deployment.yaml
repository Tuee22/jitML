apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-demo
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitml-demo
  template:
    metadata:
      labels:
        app: jitml-demo
    spec:
      containers:
        - name: jitml-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["jitml-demo"]
          args: ["--host", "0.0.0.0", "--port", "80"]
          # Sprint 4.8 — pod budget from dhall/cluster/resources.dhall (`jitmlDemo`).
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            # Sprint 13.13 — point the held-open /api/ws bridge at the
            # in-cluster Pulsar broker WebSocket service (the demo pod
            # cannot reach the host edge port) so live event frames are
            # forwarded to browser clients. JITML_SUBSTRATE selects the
            # <domain>.event.<substrate> topic family.
            - name: JITML_DEMO_PULSAR_WS
              value: "ws://pulsar-broker.platform.svc.cluster.local:8080/ws"
            # Sprint 13.1 — the demo pod reads checkpoints from the in-cluster
            # MinIO S3 service; the host edge port is unreachable from the pod.
            - name: JITML_DEMO_MINIO_S3
              value: "http://minio.platform.svc.cluster.local:9000"
            - name: JITML_SUBSTRATE
              value: "{{ .Values.substrate }}"
          ports:
            - name: http
              containerPort: 80
