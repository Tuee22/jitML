apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-service
  namespace: platform
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jitml-service
  template:
    metadata:
      labels:
        app: jitml-service
        jitml.substrate: linux-cuda
        jitml.role: engine
        jitml.compute: "true"
    spec:
      serviceAccountName: jitml-service
      runtimeClassName: nvidia
      nodeSelector:
        jitml.node-role/compute: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  jitml.compute: "true"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              jitml.compute: "true"
      containers:
        - name: jitml-service
          image: jitml:local
          imagePullPolicy: IfNotPresent
          command: ["jitml"]
          args: ["service", "--config", "/etc/jitml/BootConfig.dhall"]
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          volumeMounts:
            - name: jit-cache
              mountPath: /opt/build
            - name: service-config
              mountPath: /etc/jitml
      volumes:
        - name: jit-cache
          hostPath:
            path: /jitml/.build
        - name: service-config
          configMap:
            name: jitml-service-config
