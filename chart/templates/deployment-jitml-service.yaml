apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-service
  namespace: platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jitml-service
  template:
    metadata:
      labels:
        app: jitml-service
        jitml.substrate: linux-cpu
    spec:
      serviceAccountName: jitml-service
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: jitml-service
      containers:
        - name: jitml-service
          image: jitml:local
          imagePullPolicy: IfNotPresent
          command: ["jitml"]
          args: ["service", "--config", "/etc/jitml/BootConfig.dhall"]
          volumeMounts:
            - name: jit-cache
              mountPath: /opt/build
            - name: service-config
              mountPath: /etc/jitml
      volumes:
        - name: jit-cache
          hostPath:
            path: /jitml/.build
        - name: service-config
          configMap:
            name: jitml-service-config
