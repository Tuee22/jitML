  name: grafana-dashboard-minio-put-latency
  namespace: platform
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
    {
      "title": "minio-put-latency",
      "panels": [{"type":"timeseries","targets":[{"expr":"jitml_minio_put_latency_seconds"}]}]
    }
