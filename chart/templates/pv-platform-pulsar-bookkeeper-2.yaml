apiVersion: v1
kind: PersistentVolume
metadata:
  name: platform-pulsar-bookkeeper-pv-2
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: jitml-manual
  local:
    path: /jitml/.data/platform/pulsar-bookkeeper/pv_2/
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists
  claimRef:
    namespace: platform
    name: data-pulsar-bookkeeper-2
