apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitml-demo
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitml-demo
  template:
    metadata:
      labels:
        app: jitml-demo
    spec:
      containers:
        - name: jitml-demo
          image: jitml-demo:local
          imagePullPolicy: IfNotPresent
          command: ["jitml-demo"]
          args: ["--host", "0.0.0.0", "--port", "80"]
          ports:
            - name: http
              containerPort: 80
