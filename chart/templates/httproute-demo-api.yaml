apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-api
  namespace: platform
  labels:
    app.kubernetes.io/part-of: jitml
spec:
  parentRefs:
    - name: jitml-edge
      namespace: platform
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: jitml-demo
          port: 80
